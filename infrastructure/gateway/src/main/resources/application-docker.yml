spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8080

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/

jwt:
  secret: base64EncodedSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

keycloak:
  url: ${KEYCLOAK_URL:http://keycloak:8080}
  realm: ${KEYCLOAK_REALM:demo-corp}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

logging:
  level:
    com.reportsystem.gateway: INFO
    com.reportsystem.gateway.filter.OidcTokenValidator: INFO
