# Eureka Service Discovery + API Gateway + 7 Microservices + Nuxt Frontend
# All services use database-per-service PostgreSQL instances

---
# ── Eureka Server ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: report-system
spec:
  ports:
    - port: 8761
  selector:
    app: eureka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: report-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: reportsystem/eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# ── API Gateway ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: report-system
spec:
  ports:
    - port: 8080
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: report-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: reportsystem/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: report-system-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: report-system-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi

# ── Template: Microservice Deployment ─────────────────────────
# Each service follows the same pattern with service-specific DB URL and port
# Ports: auth=8081, property=8082, restaurant=8083, inventory=8084,
#        finance=8085, payment=8086, reporting=8087

---
# Auth Service (8081)
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: report-system
spec:
  ports:
    - port: 8081
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: report-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: reportsystem/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: report-system-config
                  key: AUTH_DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: report-system-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: report-system-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: report-system-secrets
                  key: JWT_SECRET
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: report-system-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi

