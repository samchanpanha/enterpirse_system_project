# PostgreSQL per microservice — 7 StatefulSets
# Each service gets its own database for true isolation (database-per-service pattern)

apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
  namespace: report-system
spec:
  ports:
    - port: 5432
  clusterIP: None
  selector:
    app: postgres-auth
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-auth
  namespace: report-system
spec:
  serviceName: postgres-auth
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "auth_db"
          envFrom:
            - secretRef:
                name: report-system-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
