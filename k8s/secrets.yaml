apiVersion: v1
kind: Secret
metadata:
  name: report-system-secrets
  namespace: report-system
type: Opaque
stringData:
  # PostgreSQL — single user/password shared across all service DBs
  POSTGRES_USER: "report_user"
  POSTGRES_PASSWORD: "replace-with-strong-password"

  # JWT
  JWT_SECRET: "dev-jwt-secret-key-report-system-2024-minimum-32-chars!"
  JWT_ACCESS_TOKEN_EXPIRATION: "3600000"
  JWT_REFRESH_TOKEN_EXPIRATION: "604800000"

  # Payment gateways (stubs — replace with real keys in production)
  ABA_API_KEY: "aba-stub-key"
  ABA_MERCHANT_ID: "aba-stub-merchant"
  WING_API_KEY: "wing-stub-key"
  PI_PAY_API_KEY: "pipay-stub-key"
