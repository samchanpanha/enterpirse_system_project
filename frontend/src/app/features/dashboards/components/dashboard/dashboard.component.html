<div class="dashboard-container">
  <div class="header">
    <h1>Dashboard</h1>
    <p class="subtitle">Overview of your reporting system</p>
  </div>

  <div class="content" *ngIf="!loading; else loadingTemplate">
    <!-- Metrics Cards -->
    <div class="metrics-grid">
      <app-metrics-card 
        title="Total Reports" 
        [value]="totalReports"
        icon="description"
        color="#2196F3">
      </app-metrics-card>
      
      <app-metrics-card 
        title="Active Reports" 
        [value]="activeReports"
        icon="check_circle"
        color="#4CAF50">
      </app-metrics-card>
      
      <app-metrics-card 
        title="Executions Today" 
        [value]="executionsToday"
        icon="play_arrow"
        color="#FF9800">
      </app-metrics-card>
      
      <app-metrics-card 
        title="Success Rate" 
        [value]="successRate"
        suffix="%"
        icon="trending_up"
        color="#9C27B0">
      </app-metrics-card>
    </div>

    <!-- Charts and Tables -->
    <div class="charts-section">
      <!-- Execution Trend Chart -->
      <mat-card class="chart-card">
        <mat-card-header>
          <mat-card-title>Execution Trend (Last 7 Days)</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="chart-container">
            <canvas baseChart
              [data]="executionChartData"
              [options]="chartOptions"
              chartType="bar">
            </canvas>
          </div>
        </mat-card-content>
      </mat-card>

      <!-- Recent Executions -->
      <mat-card class="executions-card">
        <mat-card-header>
          <mat-card-title>Recent Executions</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <app-recent-executions [executions]="recentExecutions"></app-recent-executions>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>

<ng-template #loadingTemplate>
  <div class="loading-container">
    <mat-progress-spinner mode="indeterminate" diameter="50"></mat-progress-spinner>
    <p>Loading dashboard...</p>
  </div>
</ng-template>
