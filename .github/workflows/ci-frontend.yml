name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/report-system-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/report-system-web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/report-system-web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/report-system-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Docker image
        run: |
          docker build -t reportsystem/nuxt-web:latest .
