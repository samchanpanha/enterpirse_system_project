name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Java)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: report_user
          POSTGRES_PASSWORD: report_pass
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean compile -DskipTests

      - name: Run unit tests (auth-service + security-core)
        run: mvn test -pl services/auth-service,shared/security-core -am

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt
          if-no-files-found: ignore

  frontend-lint:
    name: Frontend (Lint + TypeCheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/report-system-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/report-system-web/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx nuxt typecheck

  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean package -DskipTests

      - name: Start full stack
        run: |
          cd ..
          docker compose -f docker/docker-compose.yml up -d
          ./docker/scripts/wait-healthy.sh

      - name: Seed sample data
        run: |
          cd ..
          ./docker/scripts/seed-sample-data.sh

      - name: Run E2E smoke test
        run: |
          cd ..
          bash docker/scripts/e2e-smoke-test.sh
        continue-on-error: false

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p logs
          for svc in $(docker ps --format '{{.Names}}' | grep report-); do
            docker logs "$svc" > "logs/${svc}.log" 2>&1 || true
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: logs/

      - name: Tear down
        if: always()
        run: |
          cd ..
          docker compose -f docker/docker-compose.yml down
