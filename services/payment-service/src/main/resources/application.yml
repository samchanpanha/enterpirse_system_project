server:
  port: 8086

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/payment_db
    username: ${DB_USER:report_user}
    password: ${DB_PASSWORD:report_pass}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  cloud:
    discovery:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

payment:
  gateways:
    aba:
      enabled: true
      api-url: https://api.abapayway.com/v1
      merchant-id: dummy_aba
      api-key: dummy_key
    wing:
      enabled: true
      api-url: https://api.wingbank.com.kh/v1
      merchant-id: dummy_wing
      api-key: dummy_key
    pipay:
      enabled: true
      api-url: https://api.pipay.com/v1
      merchant-id: dummy_pipay
      api-key: dummy_key
    cash:
      enabled: true
