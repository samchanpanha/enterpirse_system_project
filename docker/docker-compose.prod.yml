version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-report_pass}
      POSTGRES_DB: report_system
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report_user -d report_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka-zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: kafka-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio-data-prod:/data
    restart: always

  eureka:
    build:
      context: .
      dockerfile: infrastructure/eureka/Dockerfile
    ports:
      - "8761:8761"
    restart: always

  gateway:
    build:
      context: .
      dockerfile: infrastructure/gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - eureka
    restart: always

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - eureka
    restart: always

  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - eureka
    restart: always

  restaurant-service:
    build:
      context: .
      dockerfile: services/restaurant-service/Dockerfile
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - eureka
    restart: always

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - eureka
    restart: always

  finance-service:
    build:
      context: .
      dockerfile: services/finance-service/Dockerfile
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - eureka
    restart: always

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - eureka
    restart: always

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting-service/Dockerfile
    ports:
      - "8087:8087"
    depends_on:
      - postgres
      - eureka
    restart: always

  nuxt-web:
    build:
      context: frontend/report-system-web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: always

volumes:
  postgres-data-prod:
  minio-data-prod:
